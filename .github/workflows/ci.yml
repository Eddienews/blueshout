name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend
        env:
          SECRET_KEY: ci-secret-key
          SESSION_COOKIE_SECURE: '0'
        run: python -m py_compile app.py

      - name: Smoke test Flask app
        env:
          SECRET_KEY: ci-secret-key
          SESSION_COOKIE_SECURE: '0'
        run: |
          python - <<'PYTEST'
          from app import app

          client = app.test_client()
          health = client.get('/api/health')
          assert health.status_code == 200
          assert health.get_json() == {'ok': True}

          tts = client.post('/api/tts', json={'text': 'hello'})
          assert tts.status_code == 401

          caps = client.get('/api/tts_caps')
          assert caps.status_code == 200
          caps_json = caps.get_json()
          assert 'available_bases' in caps_json
          assert 'voices' in caps_json
          assert isinstance(caps_json['voices'], list)

          assert app.config['SESSION_COOKIE_HTTPONLY'] is True
          assert app.config['SECRET_KEY']
          PYTEST
